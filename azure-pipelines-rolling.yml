# A pipeline with no CI trigger
trigger: none

pr: none

schedules:
- cron: "0 7,13,0,5 * * 1,2,3,4,5" # cron syntax https://learn.microsoft.com/en-us/azure/devops/pipelines/process/scheduled-triggers?view=azure-devops&tabs=yaml#cron-syntax
  displayName: Cosmos Weekly Rolling
  branches:
    include: 
    - main
  always: true # whether to always run the pipeline or only if there have been source code changes since the last run. The default is false
- cron: "0 0/2 * * 0,6" # cron syntax https://learn.microsoft.com/en-us/azure/devops/pipelines/process/scheduled-triggers?view=azure-devops&tabs=yaml#cron-syntax
  displayName: Cosmos Weekly Rolling
  branches:
    include: 
    - main
  always: true # whether to always run the pipeline or only if there have been source code changes since the last run. The default is false

variables:
  ReleaseArguments: ' --filter "TestCategory!=Flaky & TestCategory!=Quarantine & TestCategory!=Functional & TestCategory!=Ignore" --verbosity normal --logger "console;verbosity=detailed" --blame-hang --blame-crash'
  VmImage: windows-latest # https://docs.microsoft.com/en-us/azure/devops/pipelines/agents/hosted?view=azure-devops

jobs:
- template:  templates/build-test.yml
  parameters:
    BuildConfiguration: Release
    Arguments: $(ReleaseArguments)
    VmImage: $(VmImage)
    IncludeEncryption: true
    IncludePerformance: true
    IncludeCoverage: true

- template:  templates/build-test-live.yml
  parameters:
    BuildConfiguration: Release
    VmImage: $(VmImage)
    MultiRegionConnectionString: $(COSMOSDB_MULTI_REGION)
    MultiRegionMultiMasterConnectionString: $(COSMOSDB_MULTIMASTER)

- template:  templates/build-test.yml
  parameters:
    BuildConfiguration: Release /p:IsPreview=true
    Arguments: $(ReleaseArguments)
    VmImage: $(VmImage)
    IncludeEncryption: true
    IncludePerformance: true
    IncludeCoverage: true

- template:  templates/build-test-live.yml
  parameters:
    BuildConfiguration: Release /p:IsPreview=true
    VmImage: $(VmImage)
    MultiRegionConnectionString: $(COSMOSDB_MULTI_REGION)
    MultiRegionMultiMasterConnectionString: $(COSMOSDB_MULTIMASTER)

# Run the preview-flag build (which includes the Encryption / Encryption.Custom
# SDK-source project-ref + NuGet-surface parity builds added in PR #5798) on
# the rolling schedule so any newly-added abstract member on Container under
# #if PREVIEW that lacks an unconditional override in EncryptionContainer is
# caught off-PR as well.
- template:  templates/build-preview.yml
  parameters:
    BuildConfiguration: Release
    Arguments: ' '
    VmImage: $(VmImage)

