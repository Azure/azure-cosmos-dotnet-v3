# File: templates/build-test-aad.yml
#
# Dedicated template for the live-account AAD (Microsoft Entra ID) integration tests
# (TestCategory=MultiRegionAad). These target a shared, AAD-only live Cosmos DB account and
# run on every pipeline (the nightly schedule, azure-pipelines-nightly.yml, as well as PR
# builds, azure-pipelines.yml). The account is authenticated via a Workload Identity Federation
# service connection (client secrets are blocked by tenant policy).
#
# The job stays skipped (green) until 'AadServiceConnection' is set to the WIF service
# connection name, so this template is safe to reference before the connection is configured.

parameters:
  BuildConfiguration: ''
  OS: 'Windows'
  Arguments: ' --filter "TestCategory=MultiRegionAad" --verbosity normal '
  CategoryListName: ' MultiRegionAad '
  AadAccountEndpoint: ''
  AadServiceConnection: ''

jobs:
- job:
  displayName: EmulatorTests ${{ parameters.BuildConfiguration }} - ${{ parameters.CategoryListName }}
  timeoutInMinutes: 60
  # Runs only when an AAD service connection (Workload Identity Federation) is configured. The target
  # account is AAD-only, so the tests authenticate via the federated service connection identity instead
  # of a client secret (which is blocked by tenant policy). Stays skipped (green) until the connection is set.
  condition: and(succeeded(), eq('${{ parameters.OS }}', 'Windows'), ne('${{ parameters.AadServiceConnection }}', ''))
  pool:
    name: 'OneES'

  steps:
  - checkout: self  # self represents the repo where the initial Pipelines YAML file was found
    clean: true  # if true, execute `execute git clean -ffdx && git reset --hard HEAD` before fetching

  # Add this Command to Include the .NET 6 SDK
  - task: UseDotNet@2
    displayName: Use .NET 6.0
    inputs:
      packageType: 'runtime'
      version: '6.x'

  - task: UseDotNet@2
    displayName: Use .NET 8.0
    inputs:
      packageType: 'sdk'
      version: '8.x'

  - task: AzureCLI@2
    displayName: Microsoft.Azure.Cosmos.EmulatorTests
    retryCountOnTaskFailure: 2
    condition: succeeded()
    inputs:
      azureSubscription: ${{ parameters.AadServiceConnection }}
      scriptType: pscore
      scriptLocation: inlineScript
      # The AzureCLI task logs `az` in as the service connection identity; the SDK's
      # DefaultAzureCredential (AzureCliCredential) then acquires Cosmos data-plane tokens.
      inlineScript: |
        dotnet test 'Microsoft.Azure.Cosmos/tests/Microsoft.Azure.Cosmos.EmulatorTests/*.csproj' `
          ${{ parameters.Arguments }} --configuration ${{ parameters.BuildConfiguration }} /p:OS=${{ parameters.OS }} `
          --logger 'trx;LogFileName=MultiRegionAad.trx'
    env:
      COSMOSDB_MULTI_REGION_AAD: ${{ parameters.AadAccountEndpoint }}
      COSMOSDB_AAD_USE_DEFAULT_CREDENTIAL: true
      AZURE_COSMOS_NON_STREAMING_ORDER_BY_FLAG_DISABLED: true

  - task: PublishTestResults@2
    displayName: Publish MultiRegionAad results
    condition: succeededOrFailed()
    inputs:
      testResultsFormat: VSTest
      testResultsFiles: '**/MultiRegionAad.trx'
      testRunTitle: Microsoft.Azure.Cosmos.EmulatorTests
