# File: templates/build-distributed-transaction-test.yml
#
# Runs the live distributed-transaction (DTx) account end-to-end tests
# (TestCategory=DistributedTransactionLive) against a real DTX-enabled Cosmos DB
# account.
#
# Modeled on templates/build-thinclient.yml: the job is intentionally soft /
# non-blocking (condition: always() + continueOnError: true) so a DTx-account
# failure never fails the overall run. The account endpoint + master key are
# injected from secret pipeline variables via the COSMOS_DTX_ENDPOINT /
# COSMOS_DTX_KEY environment variables. When those secrets are not configured the
# tests report Inconclusive rather than failing.
#
# Unlike build-thinclient.yml this job does NOT start the Cosmos emulator: DTx is
# not supported by the public emulator, so the tests run only against the live
# account.

parameters:
  BuildConfiguration: ''
  Arguments: ' --filter "TestCategory=DistributedTransactionLive" --verbosity normal '
  OS: 'Windows'
  CategoryListName: ' DistributedTransaction '
  DistributedTransactionEndpoint: ''
  DistributedTransactionKey: ''

jobs:
- job:
  displayName: EmulatorTests ${{ parameters.BuildConfiguration }} - ${{ parameters.CategoryListName }}
  timeoutInMinutes: 120
  condition: always()
  continueOnError: true
  pool:
    name: 'OneES'

  steps:
  - checkout: self
    clean: true

  - task: UseDotNet@2
    displayName: Use .NET 6.0
    inputs:
      packageType: 'runtime'
      version: '6.x'

  - task: UseDotNet@2
    displayName: Use .NET 8.0
    inputs:
      packageType: 'sdk'
      version: '8.x'

  - task: DotNetCoreCLI@2
    displayName: Microsoft.Azure.Cosmos.EmulatorTests - ${{ parameters.CategoryListName }}
    inputs:
      command: test
      projects: 'Microsoft.Azure.Cosmos/tests/Microsoft.Azure.Cosmos.EmulatorTests/*.csproj'
      arguments: ${{ parameters.Arguments }} --configuration ${{ parameters.BuildConfiguration }} /p:OS=${{ parameters.OS }}
      nugetConfigPath: NuGet.config
      publishTestResults: true
      testRunTitle: Microsoft.Azure.Cosmos.EmulatorTests - ${{ parameters.CategoryListName }}
    env:
      COSMOS_DTX_ENDPOINT: ${{ parameters.DistributedTransactionEndpoint }} # Real DTX-enabled account endpoint used by the DistributedTransaction live E2E tests
      COSMOS_DTX_KEY: ${{ parameters.DistributedTransactionKey }} # Real DTX-enabled account master key
      AZURE_COSMOS_NON_STREAMING_ORDER_BY_FLAG_DISABLED: 'true'
